spring:
    application:
        name: cinebuzz

    datasource:
        url: ${SPRING_DATASOURCE_URL}
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true

    servlet:
        multipart:
            enabled: true
            max-file-size: 5MB
            max-request-size: 5MB

    mail:
        host: smtp.gmail.com
        port: 587
        username: ${SPRING_MAIL_USERNAME}
        password: ${SPRING_MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true

r2:
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: ${R2_BUCKET}
    public-url: ${R2_PUBLIC_URL}

server:
    port: 8010
    servlet:
      context-path: /cinebuzz

logging:
    level:
        com.cinebuzz: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  registration-proof-expiration-ms: 900000
  clock-skew-seconds: 120

booking:
  hold-ttl-seconds: 20

cinebuzz:
  mail:
    from: ${CINEBUZZ_MAIL_FROM}
    send-login-welcome: true
  # Used when filtering browse showtimes so past (ended) shows are hidden; match how showtimes are stored locally.
  app-timezone: ${CINEBUZZ_APP_TIMEZONE:Asia/Kolkata}
