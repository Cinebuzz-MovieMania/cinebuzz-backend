# Application logs: INFO for com.cinebuzz; set com.cinebuzz.security.JwtFilter to DEBUG to trace JWT user per request
logging:
    level:
        com.cinebuzz: INFO


springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

# JWT: expiration and clock-skew are separate concerns — see JwtUtil / JwtFilter
jwt:
  # HMAC key (Base64); must match at issue and verify time
  secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
  # How long the access token is valid after login/register (milliseconds). 86400000 = 24 hours
  expiration: 86400000
  # After email OTP verification; time window to submit name/password (milliseconds). 900000 = 15 minutes
  registration-proof-expiration-ms: 900000
  # Extra tolerance when comparing exp/nbf to server time (seconds). Helps with small client/server clock drift
  clock-skew-seconds: 120

# Checkout: server-side seat hold after login (Pay → payment page)
booking:
  hold-ttl-seconds: 20

# Same as spring.mail.username; used as From for booking confirmations
cinebuzz:
  mail:
    from: cinebuzz2003@gmail.com