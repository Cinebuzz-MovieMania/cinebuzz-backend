spring:
    application:
        name: cinebuzz

    # Optional local overrides (e.g. Gmail App Password). File is gitignored — copy from application-local.yml.example
    config:
        import: optional:classpath:application-local.yml

    datasource:
        url: jdbc:mysql://localhost:3306/cinebuzz
        username: root
        password: Harsh-2003
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true

    servlet:
        multipart:
            enabled: true
            max-file-size: 5MB
            max-request-size: 5MB

    # Booking confirmation emails — Gmail *App Password* (16 chars), not your normal login.
    # Prefer application-local.yml (gitignored) or env MAIL_PASSWORD (overrides file). See application-local.yml.example
    mail:
        host: smtp.gmail.com
        port: 587
        username: cinebuzz2003@gmail.com
        password: ${MAIL_PASSWORD:${SPRING_MAIL_PASSWORD:}}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true

